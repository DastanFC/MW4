            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.65rem;
        }
        .breaking-label .dot {
            width: 7px; height: 7px;
            background: #fff;
            border-radius: 50%;
            animation: breakingPulse 1.2s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes breakingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .breaking-scroll-wrap {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 24px;
        }
        .breaking-ticker {
            position: relative;
            width: 100%;
            text-align: center;
        }
        @keyframes breakingFade {
            0%   { opacity: 0; transform: translateY(4px); }
            10%  { opacity: 1; transform: translateY(0); }
            80%  { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-4px); }
        }
        .breaking-item {
            position: absolute;
            left: 0; right: 0;
            text-align: center;
            cursor: pointer;
            padding: 0 1rem;
            opacity: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .breaking-item.active {
            animation: breakingFade 4s ease-in-out forwards;
        }
        .breaking-item:hover { color: #ffcdd2; }
        @media (max-width: 600px) {
            .breaking-bar { gap: 0.6rem; padding: 0.45rem 0.75rem; }
            .breaking-label { padding: 0.25rem 0.5rem; font-size: 0.58rem; letter-spacing: 1px; }
            .breaking-item { font-size: 0.65rem; }
        }

        /* THREAD MODAL */
        .thread-modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.88); align-items: center; justify-content: center; padding: 1.5rem;
        }
        .thread-modal-overlay.open { display: flex; }
        .thread-modal-box {
            position: relative; max-width: 560px; width: 100%; max-height: 90vh;
            background: #111; border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(229,57,53,0.35); box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
        }
        .thread-modal-header {
            padding: 1rem 1.2rem 0.75rem; border-bottom: 1px solid #1e2a1e;
            display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
            background: #0d0d0d; flex-shrink: 0;
        }
        .thread-modal-title { font-size: 0.95rem; font-weight: 700; color: #fff; line-height: 1.3; flex: 1; }
        .thread-modal-close {
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 50%; width: 30px; height: 30px; font-size: 0.9rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.2s;
        }
        .thread-modal-close:hover { background: rgba(255,255,255,0.15); }
        .thread-modal-body { overflow-y: auto; padding: 1.2rem; flex: 1; }
        .thread-timeline { display: flex; flex-direction: column; gap: 0; }
        .thread-entry {
            display: flex; gap: 0.75rem; position: relative;
        }
        .thread-entry:not(:last-child)::before {
            content: ''; position: absolute; left: 14px; top: 28px; bottom: -8px; width: 2px;
            background: linear-gradient(to bottom, rgba(229,57,53,0.5), rgba(229,57,53,0.1));
        }
        .thread-entry + .thread-entry { margin-top: 16px; }
        .thread-dot-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .thread-dot {
            width: 28px; height: 28px; border-radius: 50%; background: #e53935;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            font-size: 0.65rem; color: #fff; font-weight: 700; z-index: 1; position: relative;
            border: 2px solid #111;
        }
        .thread-dot.first { background: #e53935; box-shadow: 0 0 8px rgba(229,57,53,0.5); }
        .thread-dot.update { background: #1e1e1e; border-color: rgba(229,57,53,0.4); color: #e53935; }
        .thread-content { flex: 1; padding-bottom: 0.2rem; }
        .thread-time { font-size: 0.6rem; color: #e53935; font-weight: 700; margin-bottom: 0.3rem; letter-spacing: 0.5px; }
        .thread-text { font-size: 0.82rem; color: #ddd; line-height: 1.55; }
        .thread-label {
            display: inline-block; font-size: 0.5rem; font-weight: 900; letter-spacing: 1px;
            text-transform: uppercase; background: rgba(229,57,53,0.15); color: #e53935;
            border: 1px solid rgba(229,57,53,0.3); border-radius: 3px; padding: 1px 5px; margin-bottom: 4px;
        }
    </style>
</head>

<script>
    const POSTS_URL = 'https://raw.githubusercontent.com/DastanFC/MW4/main/posts.json';
    let allPosts = [], visiblePosts = 8, currentFilter = 'all', searchQuery = '';

    function updateLastUpdateTime() {
        const now = new Date();
        document.getElementById('lastUpdateTime').textContent =
            now.toLocaleDateString('es-ES', { day:'numeric', month:'short' }) +
            ' · ' + now.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
    }

    function updateCounts() {
        ['all','noticia','oficial','rumor','informacion','curiosidades','ediciones','review','mapas','clases','armas','modos','warzone','skins'].forEach(cat => {
            const el = document.getElementById('count-' + cat);
            if (!el) return;
            const n = cat === 'all' ? allPosts.length : allPosts.filter(p => p.tag === cat).length;
            el.textContent = n;
            el.style.display = n === 0 ? 'none' : '';
        });
        const tc = document.getElementById('totalCount');
        if (tc) tc.textContent = allPosts.length;
    }

    function formatDate(ds) {
        const date = new Date(ds), diff = Math.floor((Date.now() - date) / 86400000);
        if (diff === 0) return 'Hoy'; if (diff === 1) return 'Ayer'; if (diff < 7) return `Hace ${diff} días`;
        return date.toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' });
    }
    function relativeTime(ds) {
        const diff = Math.floor((Date.now() - new Date(ds)) / 1000);
        if (diff < 60) return 'Ahora mismo';
        if (diff < 3600) return `Hace ${Math.floor(diff/60)} min`;
        if (diff < 86400) return `Hace ${Math.floor(diff/3600)} h`;
        if (diff < 604800) return `Hace ${Math.floor(diff/86400)} días`;
        return new Date(ds).toLocaleDateString('es-ES', { day:'numeric', month:'short' });
    }
    function isNew(ds) { return (Date.now() - new Date(ds)) < 86400000; }
    function truncateText(text, max = 80) {
        if (!text) return ''; const clean = text.replace(/<[^>]*>/g,'');
        return clean.length <= max ? clean : clean.substring(0, max) + '...';
    }
    function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    function showPostDetail(id) { window.location.href = `post.html?id=${id}`; }
    function openThreadModal(id) {
        const post = allPosts.find(p => p.id === id);
        if (!post) return;
        document.getElementById('threadModalTitle').textContent = post.title || 'Directo';
        const updates = Array.isArray(post.updates) ? post.updates : [];
        const allEntries = [
            { time: post.date, text: post.content || post.excerpt || '', label: 'Inicio' },
            ...updates.map(u => ({ time: u.time, text: u.text }))
        ].sort((a, b) => new Date(b.time) - new Date(a.time));
        const timeline = document.getElementById('threadTimeline');
        timeline.innerHTML = allEntries.map((entry, idx) => `
            <div class="thread-entry">
                <div class="thread-dot-wrap">
                    <div class="thread-dot ${idx === 0 ? 'first' : 'update'}">${idx === 0 ? '⚡' : '↑'}</div>
                </div>
                <div class="thread-content">
                    ${entry.label ? `<div class="thread-label">${entry.label}</div>` : ''}
                    <div class="thread-time">${relativeTime(entry.time)} · ${new Date(entry.time).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div>
                    <div class="thread-text">${escapeHtml(entry.text)}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('threadModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeThreadModal() {
        document.getElementById('threadModal').classList.remove('open');
        document.body.style.overflow = '';
    }
    document.getElementById('threadModalClose').addEventListener('click', closeThreadModal);
    document.getElementById('threadModal').addEventListener('click', (e) => { if (e.target === document.getElementById('threadModal')) closeThreadModal(); });

    function renderSkeletons(n = 8) {
        return Array.from({length:n}, () => `<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line s"></div><div class="skeleton-line t"></div><div class="skeleton-line m"></div><div class="skeleton-line f"></div><div class="skeleton-line m"></div></div></div>`).join('');
    }

    function shareTwitter(e, postId, title) {
        e.stopPropagation();
        const post = allPosts.find(p => p.id === postId);
        const url = `${location.origin}${location.pathname}post.html?id=${postId}`;
        const text = encodeURIComponent(`${title} #MW4 #ModernWarfare4`);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}&via=MW4esp`, '_blank', 'noopener');
    }

    function sharePost(e, postId, title) {
        e.stopPropagation();
        const url = `${location.origin}${location.pathname}post.html?id=${postId}`;
        const btn = e.currentTarget;
        if (navigator.share) { navigator.share({ title, url }).catch(()=>{}); }
        else {
            navigator.clipboard.writeText(url).then(() => {
                btn.classList.add('copied'); btn.innerHTML = '<i class="fas fa-check"></i> Copiado';
                setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<i class="fas fa-link"></i> Copiar enlace'; }, 2000);
            });
        }
    }

    const TAG_CLASS = {'oficial':'tag-oficial','noticia':'tag-noticia','rumor':'tag-rumor','review':'tag-review','mapas':'tag-mapas','clases':'tag-clases','armas':'tag-armas','modos':'tag-modos','warzone':'tag-warzone','dmz':'tag-dmz','campana':'tag-campana','skins':'tag-skins','informacion':'tag-informacion','curiosidades':'tag-curiosidades','ediciones':'tag-ediciones'};
    const TAG_ICON  = {'oficial':'✓','noticia':'📰','rumor':'🔮','review':'⭐','mapas':'🗺️','clases':'🎖️','armas':'🔫','modos':'🎮','warzone':'🪂','dmz':'🏴','campana':'⚔️','skins':'🎨','informacion':'📡','curiosidades':'🧠','ediciones':'💎'};

    function getFilteredPosts() {
        let posts = currentFilter === 'all' ? allPosts : allPosts.filter(p => p.tag === currentFilter);
        if (searchQuery) { const q = searchQuery.toLowerCase(); posts = posts.filter(p => (p.title||'').toLowerCase().includes(q)||(p.excerpt||'').toLowerCase().includes(q)||(p.content||'').toLowerCase().includes(q)); }
        return posts;
    }

    function renderPosts() {
        const grid = document.getElementById('newsGrid');
        const filtered = getFilteredPosts(), postsToShow = filtered.slice(0, visiblePosts);
        if (postsToShow.length === 0) {
            const msg = searchQuery ? `<i class="fas fa-search"></i> Sin resultados para "<strong>${escapeHtml(searchQuery)}</strong>"` : (currentFilter !== 'all' ? '<i class="fas fa-filter"></i> No hay noticias con este filtro' : '<i class="fas fa-skull"></i> No hay noticias aún.');
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:2rem;">${msg}</div>`;
            document.getElementById('loadMoreBtn').style.display = 'none'; return;
        }
        grid.innerHTML = postsToShow.map((post, i) => {
            const tc = TAG_CLASS[post.tag]||'tag-noticia', ti = TAG_ICON[post.tag]||'📰';
            const updBadge = post.updated ? `<div class="updated-badge">🔄 Actualizado</div>` : '';
            const newBadge = isNew(post.date) ? `<div class="new-badge">NUEVO</div>` : '';

            if (post.flash) {
                // ===== NUEVA LÓGICA DE MEDIA DIRECTA =====
                // Prioridad: redditGif > redditMp4 > gif > mp4 > video > reddit (solo enlace) > image
                let mediaHtml = '';
                let hasDirectMedia = false;
                
                if (post.redditGif) {
                    // GIF extraído de Reddit
                    mediaHtml = `<div class="flash-video-wrap"><img class="flash-media-direct" src="${escapeHtml(post.redditGif)}" alt="GIF" loading="lazy"><span class="flash-gif-badge">GIF</span></div>`;
                    hasDirectMedia = true;
                } else if (post.redditMp4) {
                    // MP4 extraído de Reddit (vídeo)
                    mediaHtml = `<div class="flash-video-wrap"><video class="flash-media-direct" src="${escapeHtml(post.redditMp4)}" autoplay muted loop playsinline onerror="this.style.display='none'"></video></div>`;
                    hasDirectMedia = true;
                } else if (post.gif) {
                    mediaHtml = `<div class="flash-video-wrap"><img class="flash-media-direct" src="${escapeHtml(post.gif)}" alt="GIF" loading="lazy"><span class="flash-gif-badge">GIF</span></div>`;
                    hasDirectMedia = true;
                } else if (post.mp4) {
                    mediaHtml = `<div class="flash-video-wrap"><video class="flash-media-direct" src="${escapeHtml(post.mp4)}" autoplay muted loop playsinline onerror="this.style.display='none'"></video></div>`;
                    hasDirectMedia = true;
                } else if (post.video) {
                    const ytMatch = post.video.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([^&?/]+)/);
                    if (ytMatch) {
                        const thumb = `https://img.youtube.com/vi/${ytMatch[1]}/hqdefault.jpg`;
                        mediaHtml = `<div class="flash-video-wrap"><img class="flash-media-direct" src="${thumb}" alt="YouTube" loading="lazy"><div class="flash-play-icon"></div></div>`;
                        hasDirectMedia = true;
                    }
                } else if (post.reddit && !hasDirectMedia) {
                    // Solo URL de Reddit sin media extraída - mostrar enlace simple
                    const redditUrl = post.reddit.trim();
                    const subMatch = redditUrl.match(/reddit\.com\/r\/([^/?#]+)/);
                    const subName = subMatch ? 'r/' + subMatch[1] : 'Reddit';
                    mediaHtml = `<a href="${escapeHtml(redditUrl)}" target="_blank" rel="noopener" style="text-decoration:none;display:block;margin-bottom:0.6rem;" onclick="event.stopPropagation()">
                        <div style="display:flex;align-items:center;gap:0.65rem;background:#0d1117;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.75rem 1rem;">
                            <svg width="22" height="22" viewBox="0 0 20 20" fill="#ff4500"><circle cx="10" cy="10" r="10" fill="#ff4500"/><path d="M16.67 10a1.46 1.46 0 0 0-2.47-1 7.12 7.12 0 0 0-3.85-1.23l.65-3.07 2.13.45a1 1 0 1 0 .14-.64l-2.38-.5a.26.26 0 0 0-.31.2l-.73 3.43a7.14 7.14 0 0 0-3.89 1.23 1.46 1.46 0 1 0-1.61 2.39 2.89 2.89 0 0 0 0 .44c0 2.24 2.61 4.06 5.83 4.06s5.83-1.82 5.83-4.06a2.89 2.89 0 0 0 0-.44 1.46 1.46 0 0 0 .57-1.26zm-9.4 1a1 1 0 1 1 1 1 1 1 0 0 1-1-1zm5.57 2.64a3.56 3.56 0 0 1-2.84.77 3.56 3.56 0 0 1-2.84-.77.19.19 0 1 1 .27-.27 3.2 3.2 0 0 0 2.57.65 3.2 3.2 0 0 0 2.57-.65.19.19 0 0 1 .27.27zm-.15-1.64a1 1 0 1 1 1-1 1 1 0 0 1-1 1z" fill="#fff"/></svg>
                            <div style="flex:1;"><div style="font-size:0.72rem;color:#fff;font-weight:700;">${escapeHtml(subName)}</div><div style="font-size:0.6rem;color:#555;">Ver en Reddit</div></div>
                        </div>
                    </a>`;
                } else if (post.image) {
                    mediaHtml = `<div class="flash-video-wrap"><img class="flash-media-direct" src="${escapeHtml(post.image)}" alt="" loading="lazy"></div>`;
                    hasDirectMedia = true;
                }

                const flashContent = (post.content||post.excerpt||'').replace(/<[^>]*>/g,'');
                
                let sourceHtml = '';
                if (post.source) {
                    const isUrl = post.source.startsWith('http');
                    const srcLabel = isUrl ? post.source.replace(/^https?:\/\//, '').split('/')[0] : post.source;
                    const srcLink = isUrl ? `<a href="${escapeHtml(post.source)}" target="_blank" rel="noopener">${escapeHtml(srcLabel)}</a>` : escapeHtml(post.source);
                    sourceHtml = `<div class="flash-source"><i class="fas fa-link" style="font-size:0.5rem"></i> ${srcLink}</div>`;
                }
                const flashRelId = 'frt-' + post.id;

                // LIVE card
                if (post.live) {
                    return `<div class="news-card flash-card live-card" data-id="${post.id}" data-live="1" style="animation-delay:${i*0.05}s;cursor:pointer">
                        <div class="image-container"></div>
                        <div class="flash-body">
                            <div class="flash-header">
                                <div class="flash-avatar"><img src="favicon.png" alt="MW4" onerror="this.style.display='none';this.parentElement.textContent='🎮'"></div>
                                <div class="flash-account">
                                    <div class="flash-account-name">MW4 Esp</div>
                                    <div class="flash-account-handle">@MW4esp</div>
                                </div>
                                <div class="live-badge-wrap"><span class="live-dot"></span>DIRECTO</div>
                            </div>
                            <div class="flash-text">${escapeHtml(flashContent).substring(0, 200)}</div>
                            ${sourceHtml}
                            <div class="flash-footer">
                                <div class="flash-footer-left">
                                    <span class="card-tag ${tc}">${ti} ${post.tag.toUpperCase()}</span>
                                    <div class="card-date" id="${flashRelId}"><i class="far fa-clock"></i> ${relativeTime(post.date)}</div>
                                </div>
                                <div class="flash-footer-right">
                                    <button class="share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><i class="fas fa-link"></i> Copiar</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }

                // FLASH normal con media directa
                return `<div class="news-card flash-card" data-id="${post.id}" style="animation-delay:${i*0.05}s;${hasDirectMedia ? 'cursor:pointer' : 'cursor:default'}">
                    <div class="image-container"></div>
                    <div class="flash-body">
                        <div class="flash-header">
                            <div class="flash-avatar"><img src="favicon.png" alt="MW4" onerror="this.style.display='none';this.parentElement.textContent='🎮'"></div>
                            <div class="flash-account">
                                <div class="flash-account-name">MW4 Esp</div>
                                <div class="flash-account-handle">@MW4esp</div>
                            </div>
                            <div class="flash-badge">⚡ Flash</div>
                        </div>
                        <div class="flash-text">${escapeHtml(flashContent).substring(0, 200)}${flashContent.length > 200 ? '...' : ''}</div>
                        ${mediaHtml}
                        ${sourceHtml}
                        <div class="flash-footer">
                            <div class="flash-footer-left">
                                <span class="card-tag ${tc}">${ti} ${post.tag.toUpperCase()}</span>
                                <div class="card-date" id="${flashRelId}"><i class="far fa-clock"></i> ${relativeTime(post.date)}</div>
                            </div>
                            <div class="flash-footer-right">
                                <button class="share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><i class="fas fa-link"></i> Copiar</button>
                                <button class="twitter-share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622z"/></svg> Twittear</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            // NOTICIA normal
            return `<div class="news-card" data-id="${post.id}" style="animation-delay:${i*0.05}s">
                <div class="image-container">${updBadge}${newBadge}
                    <img class="card-image" src="${post.image||'https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4'}" alt="${escapeHtml(post.title)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4'">
                </div>
                <div class="card-content">
                    <span class="card-tag ${tc}">${ti} ${post.tag.toUpperCase()}</span>
                    <h3 class="card-title">${escapeHtml(post.title)}</h3>
                    <div class="card-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                    <p class="card-excerpt">${escapeHtml(truncateText(post.excerpt||post.content,80))}</p>
                    <div class="card-share">
                        <button class="share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><i class="fas fa-link"></i> Copiar</button>
                        <button class="twitter-share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622z"/></svg> Twittear</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        
        grid.querySelectorAll('.news-card:not(.live-card)').forEach(c => {
            c.addEventListener('click', (e) => {
                if (c.classList.contains('flash-card')) {
                    // Flash: si tiene media directa, abre modal multimedia; si no, abre post normal
                    if (c.querySelector('.flash-media-direct') || c.querySelector('.flash-video-wrap')) {
                        const pid = parseInt(c.dataset.id);
                        if (pid) openMediaModal(pid);
                    } else {
                        showPostDetail(parseInt(c.dataset.id));
                    }
                } else {
                    showPostDetail(parseInt(c.dataset.id));
                }
            });
        });
        grid.querySelectorAll('.live-card').forEach(c => {
            c.addEventListener('click', () => openThreadModal(parseInt(c.dataset.id)));
        });
        grid.querySelectorAll('.share-btn').forEach(b => b.addEventListener('click', e => sharePost(e, b.dataset.id, b.dataset.title)));
        grid.querySelectorAll('.twitter-share-btn').forEach(b => b.addEventListener('click', e => shareTwitter(e, b.dataset.id, b.dataset.title)));
        document.getElementById('loadMoreBtn').style.display = visiblePosts >= filtered.length ? 'none' : 'block';
    }

    // Modal multimedia para flash (vídeo/GIF)
    function openMediaModal(id) {
        const post = allPosts.find(p => p.id === id);
        if (!post) return;
        let mediaUrl = '';
        let mediaType = '';
        if (post.redditGif) { mediaUrl = post.redditGif; mediaType = 'gif'; }
        else if (post.redditMp4) { mediaUrl = post.redditMp4; mediaType = 'mp4'; }
        else if (post.gif) { mediaUrl = post.gif; mediaType = 'gif'; }
        else if (post.mp4) { mediaUrl = post.mp4; mediaType = 'mp4'; }
        else if (post.video) {
            const ytMatch = post.video.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([^&?/]+)/);
            if (ytMatch) {
                mediaUrl = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;
                mediaType = 'youtube';
            }
        }
        if (!mediaUrl) return;
        
        const modal = document.createElement('div');
        modal.className = 'media-modal-overlay';
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="media-modal-box" style="max-width:90vw;max-height:90vh;">
                <button class="media-modal-close" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;z-index:10;">✕</button>
                <div class="media-modal-content" style="display:flex;align-items:center;justify-content:center;min-height:200px;">
                    ${mediaType === 'gif' ? `<img src="${mediaUrl}" style="max-width:100%;max-height:80vh;display:block;border-radius:8px;">` :
                      mediaType === 'mp4' ? `<video src="${mediaUrl}" autoplay controls loop style="max-width:100%;max-height:80vh;background:#000;" playsinline></video>` :
                      mediaType === 'youtube' ? `<div style="position:relative;padding-top:56.25%;width:100%;"><iframe src="${mediaUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen allow="autoplay"></iframe></div>` : ''}
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.body.style.overflow = 'hidden';
        const closeBtn = modal.querySelector('.media-modal-close');
        const closeModal = () => { modal.remove(); document.body.style.overflow = ''; };
        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', esc); } });
    }

    async function loadPosts() {
        document.getElementById('newsGrid').innerHTML = renderSkeletons(8);
        try {
            const r = await fetch(POSTS_URL + '?t=' + Date.now());
            if (!r.ok) throw new Error();
            allPosts = await r.json();
            updateCounts(); updateLastUpdateTime(); renderPosts(); initBreakingNews();
        } catch {
            document.getElementById('newsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;"><i class="fas fa-exclamation-triangle"></i> Error cargando noticias.</div>';
            document.getElementById('loadMoreBtn').style.display = 'none';
        }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentFilter = btn.dataset.filter; visiblePosts = 8; renderPosts();
    }));
    document.getElementById('loadMoreBtn').addEventListener('click', () => { visiblePosts += 4; renderPosts(); });

    const filterToggle = document.getElementById('filterToggle');
    const filtersContainer = document.getElementById('filtersContainer');
    filterToggle.addEventListener('click', () => {
        const open = filtersContainer.classList.toggle('open');
        filterToggle.classList.toggle('open', open);
    });

    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    searchInput.addEventListener('input', () => {
        searchQuery = searchInput.value.trim();
        searchClear.classList.toggle('visible', searchQuery.length > 0);
        visiblePosts = 8; renderPosts();
    });
    searchClear.addEventListener('click', () => {
        searchInput.value = ''; searchQuery = ''; searchClear.classList.remove('visible'); visiblePosts = 8; renderPosts();
    });

    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => scrollTopBtn.classList.toggle('visible', window.scrollY > 400), { passive: true });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    const BANNER_CONFIG = {
        enabled: true,
        image: 'https://i.imgur.com/2w5hpc7.png',
        link: 'https://dastanfc.github.io/MW4/',
        openInNewTab: true
    };
    function initBanner() {
        if (!BANNER_CONFIG.enabled || !BANNER_CONFIG.image) return;
        const wrapper = document.getElementById('siteBannerWrapper');
        const img     = document.getElementById('bannerImg');
        const link    = document.getElementById('bannerLink');
        img.src = BANNER_CONFIG.image;
        link.href = BANNER_CONFIG.link;
        if (!BANNER_CONFIG.openInNewTab) link.removeAttribute('target');
        if (BANNER_CONFIG.link === '#') link.style.cursor = 'default';
        wrapper.style.display = '';
    }
    initBanner();

    function initBreakingNews() {
        const recent = allPosts.filter(p => (Date.now() - new Date(p.date)) < 43200000);
        if (recent.length === 0) return;
        const bar    = document.getElementById('breakingBar');
        const ticker = document.getElementById('breakingTicker');
        ticker.style.height = '22px';
        ticker.innerHTML = recent.map((p, i) => `<span class="breaking-item" data-id="${p.id}">${p.title}</span>`).join('');
        const items = ticker.querySelectorAll('.breaking-item');
        items.forEach(el => el.addEventListener('click', () => showPostDetail(parseInt(el.dataset.id))));
        bar.style.display = '';
        let current = 0;
        function showNext() {
            items.forEach(el => { el.classList.remove('active'); void el.offsetWidth; });
            items[current].classList.add('active');
            current = (current + 1) % items.length;
        }
        showNext();
        setInterval(showNext, 4000);
    }

    setInterval(() => {
        allPosts.filter(p => p.flash || p.live).forEach(p => {
            const el = document.getElementById('frt-' + p.id);
            if (el) el.innerHTML = '<i class="far fa-clock"></i> ' + relativeTime(p.date);
        });
    }, 60000);

    loadPosts();
</script>
</body>
</html>
